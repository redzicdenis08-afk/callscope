name: Launch Ready

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

jobs:
  launch-ready:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test
        run: |
          python tests/test_callscope.py
          python -m pytest -q
      - name: Benchmark
        run: |
          python -m callscope benchmark benchmark/calls.jsonl
      - name: Launch surface audit
        run: |
          python scripts/launch_audit.py
